<div>
    <h2>Введите новый пароль</h2>
    <input type="password" id="newPassword" placeholder="Новый пароль">
    <button class="buttonSave">Сохранить новый пароль</button>
</div>

<script type="module">
    import { getAuth, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

        const firebaseConfig = {
        apiKey: "AIzaSyD4QgYInkbdn8igp34HTMv4IeRRdSXNCOc",
        authDomain: "gifts-a1a34.firebaseapp.com",
        projectId: "gifts-a1a34",
        storageBucket: "gifts-a1a34.firebasestorage.app",
        messagingSenderId: "297894058977",
        appId: "1:297894058977:web:dd62d1a361e524362990a0",
        measurementId: "G-1K5Z3FGH6C"
    };

    // ✅ Самое важное: инициализируем приложение
    const app = initializeApp(firebaseConfig);

    async function confirmPasswordResetWrapper() {
        const auth = getAuth(app);
        const urlParams = new URLSearchParams(window.location.search);
        const oobCode = urlParams.get('oobCode'); // Получаем код из URL
        const newPassword = document.getElementById('newPassword').value;

        try {
            await confirmPasswordReset(auth, oobCode, newPassword);
            alert('Пароль успешно изменен! Теперь вы можете войти с новым паролем.');
            window.location.href = 'https://gifts-a1a34.web.app'; // Перенаправляем на страницу входа
        } catch (error) {
            console.error("Ошибка при смене пароля:", error);
            alert('Не удалось изменить пароль. Ссылка могла устареть или быть недействительной.');
        }
    }

            document.addEventListener("click", (event) => {
        if (event.target.classList.contains("buttonSave")) {
           confirmPasswordResetWrapper();
        }
        });

</script>
